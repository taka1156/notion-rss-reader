name: build deploy gh-pages front

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  TZ: 'Asia/Tokyo'

jobs:
  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
      - run: make front-ci

      - name: download entries.json
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: batch.yaml
          name: entries-json
          path: .dist/
          if_no_artifact_found: warn
      - run: make front-build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: .dist/

  deploy:
    needs: build
    if: always() && needs.build.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: download dist
        id: download-dist
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build.yaml
          name: frontend-dist
          path: .dist/
          if_no_artifact_found: warn
          search_artifacts: true

      - name: upload pages artifact
        if: steps.download-dist.outputs.found_artifact == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .dist/

      - name: deploy to Github Pages
        id: deploy
        if: steps.download-dist.outputs.found_artifact == 'true'
        uses: actions/deploy-pages@v4
