name: build front

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  TZ: 'Asia/Tokyo'
jobs:
  batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - run: make front-ci
      - run: make front-build
