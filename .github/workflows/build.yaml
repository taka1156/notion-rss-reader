name: build deploy gh-pages front

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  TZ: 'Asia/Tokyo'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4

      - name: install
        run: make front-ci

      - name: download entries.json
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: batch.yaml
          name: entries-json
          path: ./.dist/

      - name: download previous dist
        if: github.event_name != 'push'
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build.yaml
          name: frontend-dist
          path: .dist/

      - name: build
        if: github.event_name == 'push'
        run: make front-build

      - name: upload dist
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: .dist/

      - name: deploy to Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .dist
